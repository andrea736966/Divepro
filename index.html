<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, interactive-widget=resizes-content">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#042C53">
<title>DiveMaster Pro</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{height:100%;overflow:hidden;font-family:-apple-system,BlinkMacSystemFont,'Noto Sans TC',sans-serif;background:#eee}
#app{display:flex;flex-direction:column;height:100%;max-width:430px;margin:0 auto;background:#f5f5f3;position:relative}
/* topbar */
#topbar{background:#fff;border-bottom:1px solid #e8e8e8;padding:12px 16px;padding-top:max(12px,env(safe-area-inset-top));display:flex;align-items:center;justify-content:space-between;flex-shrink:0;z-index:10}
.logo{display:flex;align-items:center;gap:10px}
.logo-icon{width:34px;height:34px;background:#042C53;border-radius:9px;display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0}
.logo-name{font-size:15px;font-weight:700;color:#1a1a1a;line-height:1.1}
.logo-sub{font-size:10px;color:#999;letter-spacing:.4px}
.top-btns{display:flex;gap:8px}
.icon-btn{width:36px;height:36px;border-radius:9px;background:#f5f5f3;border:1px solid #e8e8e8;cursor:pointer;font-size:17px;display:flex;align-items:center;justify-content:center}
.icon-btn:active{opacity:.6}
/* scroll */
#scroll{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;scroll-behavior:smooth}
#scroll::-webkit-scrollbar{display:none}
/* tabbar */
#tabbar{background:#fff;border-top:1px solid #e8e8e8;display:flex;flex-shrink:0;padding-bottom:max(4px,env(safe-area-inset-bottom))}
.tab{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:8px 2px;cursor:pointer;border:none;background:none;gap:2px;min-height:52px}
.tab:active{opacity:.6}
.tab-icon{font-size:21px;line-height:1}
.tab-lbl{font-size:10px;font-weight:500;color:#aaa;font-family:inherit}
.tab.on .tab-lbl{color:#042C53;font-weight:700}
/* screens */
.screen{display:none;padding:16px;padding-bottom:max(90px,calc(env(safe-area-inset-bottom)+80px))}
.screen.on{display:block}
/* cards */
.card{background:#fff;border-radius:14px;border:1px solid #e8e8e8;padding:14px;margin-bottom:10px;box-shadow:0 1px 3px rgba(0,0,0,.04)}
.card-press{cursor:pointer}.card-press:active{opacity:.75}
/* typography */
.t-h1{font-size:22px;font-weight:700;color:#1a1a1a;letter-spacing:-.3px}
.t-h2{font-size:16px;font-weight:600;color:#1a1a1a}
.t-h3{font-size:14px;font-weight:600;color:#1a1a1a}
.t-body{font-size:14px;color:#333;line-height:1.5}
.t-small{font-size:12px;color:#888;line-height:1.5}
.t-xs{font-size:11px;color:#aaa}
.t-label{font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.6px;color:#888}
/* layout helpers */
.row{display:flex;align-items:center}
.row-between{display:flex;align-items:center;justify-content:space-between}
.gap8{gap:8px}.gap12{gap:12px}
.mb8{margin-bottom:8px}.mb12{margin-bottom:12px}.mb16{margin-bottom:16px}
.ph{display:flex;align-items:center;justify-content:space-between;margin-bottom:18px}
.section-head{display:flex;align-items:center;justify-content:space-between;margin:16px 0 8px}
.section-action{font-size:13px;color:#185FA5;cursor:pointer;padding:4px}
/* badges */
.badge{display:inline-flex;align-items:center;padding:3px 9px;border-radius:100px;font-size:11px;font-weight:600;white-space:nowrap}
.b-green{background:#E1F5EE;color:#085041}
.b-amber{background:#FAEEDA;color:#633806}
.b-red{background:#FCEBEB;color:#791F1F}
.b-blue{background:#E6F1FB;color:#0C447C}
.b-gray{background:#f0f0f0;color:#666}
/* buttons */
.btn{display:inline-flex;align-items:center;justify-content:center;gap:6px;padding:11px 18px;border-radius:10px;font-size:14px;font-weight:600;cursor:pointer;border:none;font-family:inherit;transition:opacity .15s}
.btn:active{opacity:.75}
.btn-primary{background:#042C53;color:#B5D4F4}
.btn-secondary{background:#f5f5f3;color:#333;border:1px solid #e0e0e0}
.btn-danger{background:#FCEBEB;color:#791F1F}
.btn-success{background:#E1F5EE;color:#085041}
.btn-full{width:100%;display:flex}
.btn-sm{padding:7px 14px;font-size:12px}
.add-btn{width:38px;height:38px;border-radius:10px;background:#042C53;border:none;color:#B5D4F4;font-size:24px;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.add-btn:active{opacity:.7}
/* form */
.form-group{margin-bottom:14px}
.flabel{font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.6px;color:#888;margin-bottom:6px;display:block}
.finput{width:100%;padding:12px 14px;border-radius:10px;border:1px solid #ddd;background:#f9f9f7;color:#1a1a1a;font-size:15px;font-family:inherit;-webkit-appearance:none;display:block;margin-bottom:0}
.finput:focus{outline:none;border-color:#185FA5;background:#fff}
.finput::placeholder{color:#bbb}
.frow{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.form-error{font-size:12px;color:#E24B4A;margin-top:4px}
/* select grid */
.sel-grid{display:flex;flex-wrap:wrap;gap:8px}
.sel-opt{padding:7px 14px;border-radius:100px;border:1px solid #ddd;background:#f9f9f7;color:#666;font-size:13px;font-weight:500;cursor:pointer;user-select:none}
.sel-opt:active{opacity:.6}
.sel-opt.on{background:#042C53;color:#B5D4F4;border-color:#042C53}
/* chip bar */
.chip-bar{display:flex;gap:8px;overflow-x:auto;margin-bottom:14px;scrollbar-width:none;padding-bottom:2px}
.chip-bar::-webkit-scrollbar{display:none}
.chip{padding:6px 14px;border-radius:100px;border:1px solid #ddd;background:#f9f9f7;color:#666;font-size:13px;font-weight:500;cursor:pointer;white-space:nowrap;flex-shrink:0;user-select:none}
.chip:active{opacity:.6}
.chip.on{background:#042C53;color:#B5D4F4;border-color:#042C53}
/* progress */
.prog-track{height:6px;background:#f0f0f0;border-radius:100px;overflow:hidden}
.prog-fill{height:100%;border-radius:100px;transition:width .6s}
/* metrics */
.metric-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:16px}
.metric{background:#fff;border-radius:12px;border:1px solid #e8e8e8;padding:12px 14px}
.metric-lbl{font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:.5px;color:#aaa;margin-bottom:5px}
.metric-val{font-size:22px;font-weight:700;color:#1a1a1a;letter-spacing:-.5px}
.metric-sub{font-size:11px;margin-top:3px}
/* avatar */
.av{border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:700;flex-shrink:0}
/* divider */
.divider{height:1px;background:#f0f0f0;margin:10px 0}
/* toggle */
.tog{position:relative;width:44px;height:26px;flex-shrink:0;display:inline-block}
.tog input{position:absolute;opacity:0;width:0;height:0}
.tog-track{position:absolute;inset:0;border-radius:13px;background:#ddd;cursor:pointer;transition:background .2s}
.tog input:checked+.tog-track{background:#185FA5}
.tog-thumb{position:absolute;top:3px;left:3px;width:20px;height:20px;border-radius:50%;background:#fff;box-shadow:0 1px 3px rgba(0,0,0,.25);transition:transform .2s;pointer-events:none}
.tog input:checked+.tog-track .tog-thumb{transform:translateX(18px)}
/* settings rows */
.s-group{background:#fff;border-radius:14px;border:1px solid #e8e8e8;overflow:hidden;margin-bottom:10px}
.s-row{display:flex;align-items:center;gap:12px;padding:14px 16px;cursor:pointer;user-select:none}
.s-row:active{background:#f5f5f3}
.s-row+.s-row{border-top:1px solid #f0f0f0}
.s-icon{font-size:18px;width:26px;text-align:center;flex-shrink:0}
.s-text{flex:1}
.s-title{font-size:15px;font-weight:500;color:#1a1a1a}
.s-sub{font-size:12px;color:#aaa;margin-top:1px}
.s-chev{color:#ccc;font-size:18px}
/* lang/currency grid */
.option-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px}
.option-card{border:2px solid #e8e8e8;border-radius:12px;padding:10px 6px;text-align:center;cursor:pointer;background:#f9f9f7;user-select:none}
.option-card:active{opacity:.7}
.option-card.on{border-color:#185FA5;background:#E6F1FB}
.option-card-name{font-size:14px;font-weight:700;color:#555}
.option-card.on .option-card-name{color:#185FA5}
.option-card-sub{font-size:10px;color:#aaa;margin-top:2px}
/* scan */
.scan-btn{width:100%;padding:13px;border-radius:12px;background:linear-gradient(135deg,#042C53,#185FA5);color:#B5D4F4;border:none;font-size:14px;font-weight:700;cursor:pointer;font-family:inherit;display:flex;align-items:center;justify-content:center;gap:8px;margin-bottom:12px}
.scan-btn:active{opacity:.8}
.scan-btn.scanning{animation:pulse 1s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.6}}
.scan-result{background:#E1F5EE;border:1px solid #9FE1CB;border-radius:10px;padding:12px;margin-bottom:14px}
/* upload */
.upload-area{border:2px dashed #ddd;border-radius:12px;padding:20px;text-align:center;cursor:pointer;background:#f9f9f7;margin-bottom:12px}
.upload-area:active{border-color:#185FA5;background:#E6F1FB}
.upload-area.has-file{border-color:#1D9E75;border-style:solid;background:#E1F5EE}
/* cost type cards */
.cost-type-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:14px}
.cost-type-card{padding:12px;border-radius:12px;border:2px solid #e8e8e8;background:#f9f9f7;cursor:pointer;text-align:center;user-select:none}
.cost-type-card:active{opacity:.7}
.cost-type-card.on{border-color:#185FA5;background:#E6F1FB}
/* pricing result */
.pricing-result-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:12px}
.pricing-box{border-radius:12px;padding:12px;text-align:center}
.pricing-box-val{font-size:20px;font-weight:700}
.pricing-box-lbl{font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:.4px;margin-top:3px}
/* pro gate */
.pro-gate{border:2px dashed #ddd;border-radius:14px;padding:24px;text-align:center;margin-bottom:14px}
/* modal */
#modal-bg{display:none;position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:200;align-items:flex-end;justify-content:center}
#modal-bg.on{display:flex}
#modal-sheet{background:#fff;border-radius:20px 20px 0 0;width:100%;max-width:430px;max-height:92vh;overflow-y:auto;padding-bottom:max(24px,env(safe-area-inset-bottom))}
.modal-handle{width:36px;height:4px;border-radius:2px;background:#ddd;margin:10px auto 0}
.modal-hdr{display:flex;align-items:center;justify-content:space-between;padding:14px 16px 12px;border-bottom:1px solid #f0f0f0}
.modal-title{font-size:16px;font-weight:700;color:#1a1a1a}
.modal-cancel{font-size:15px;color:#185FA5;cursor:pointer;padding:4px}
.modal-save{font-size:15px;font-weight:700;color:#185FA5;cursor:pointer;padding:4px}
.modal-body{padding:16px;padding-bottom:20px}
/* empty */
.empty{text-align:center;padding:48px 24px;color:#bbb;font-size:14px;line-height:1.8}
/* trip type icons */
.trip-type-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin-bottom:14px}
.trip-type-card{border:2px solid #e8e8e8;border-radius:12px;padding:12px 6px;text-align:center;cursor:pointer;background:#f9f9f7}
.trip-type-card:active{opacity:.7}
.trip-type-card.on{border-color:#185FA5;background:#E6F1FB}
/* help */
.help-section{margin-bottom:20px}
.help-title{font-size:16px;font-weight:700;color:#1a1a1a;border-bottom:2px solid #E6F1FB;padding-bottom:8px;margin-bottom:12px}
.help-item{display:flex;gap:12px;padding:10px 0;border-bottom:1px solid #f5f5f5}
.help-num{width:26px;height:26px;border-radius:50%;background:#042C53;color:#B5D4F4;font-size:12px;font-weight:700;display:flex;align-items:center;justify-content:center;flex-shrink:0;margin-top:1px}
.faq-item{margin-bottom:12px;padding-bottom:12px;border-bottom:1px solid #f5f5f5}
.faq-q{font-size:13px;font-weight:700;color:#042C53;margin-bottom:3px}
.faq-a{font-size:13px;color:#555;line-height:1.6}
</style>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.29/jspdf.plugin.autotable.min.js"></script>
</head>

<div id="app">
  <div id="topbar">
    <div class="logo">
      <div class="logo-icon">🤿</div>
      <div>
        <div class="logo-name">DiveMaster Pro</div>
        <div class="logo-sub" id="l-sub">旅程管理系統</div>
      </div>
    </div>
    <div class="top-btns">
      <div class="icon-btn" onclick="showWelcomeModal()" title="說明">❓</div>
      <div class="icon-btn" onclick="gotoTab('settings')" title="設定">⚙️</div>
    </div>
  </div>
  <div id="scroll">
    <div id="sc-overview"  class="screen on"></div>
    <div id="sc-trips"     class="screen"></div>
    <div id="sc-people"    class="screen"></div>
    <div id="sc-finance"   class="screen"></div>
    <div id="sc-docs"      class="screen"></div>
    <div id="sc-settings"  class="screen"></div>
    <div id="sc-help"      class="screen"></div>
  </div>
  <div id="tabbar">
    <button class="tab on" id="tab-overview"  onclick="gotoTab('overview')"><div class="tab-icon">🏠</div><div class="tab-lbl" id="tl-ov">總覽</div></button>
    <button class="tab"    id="tab-trips"     onclick="gotoTab('trips')"><div class="tab-icon">🗓</div><div class="tab-lbl" id="tl-tr">旅程</div></button>
    <button class="tab"    id="tab-people"    onclick="gotoTab('people')"><div class="tab-icon">👥</div><div class="tab-lbl" id="tl-pe">成員</div></button>
    <button class="tab"    id="tab-finance"   onclick="gotoTab('finance')"><div class="tab-icon">💰</div><div class="tab-lbl" id="tl-fi">財務</div></button>
    <button class="tab"    id="tab-docs"      onclick="gotoTab('docs')"><div class="tab-icon">📁</div><div class="tab-lbl" id="tl-do">文件</div></button>
  </div>
</div>

<div id="modal-bg" onclick="if(event.target===this)closeModal()">
  <div id="modal-sheet">
    <div class="modal-handle"></div>
    <div class="modal-hdr">
      <span class="modal-cancel" id="m-cancel" onclick="closeModal()">取消</span>
      <span class="modal-title"  id="m-title"></span>
      <span class="modal-save"   id="m-save"   onclick="modalSave()">儲存</span>
    </div>
    <div class="modal-body" id="m-body" style="padding-bottom:300px"></div>
  </div>
</div>

var DB;

function initDB(){
  var saved = localStorage.getItem('dmp_v2');
  if(saved){
    try{ DB = JSON.parse(saved); return; }catch(e){}
  }
  DB = {
    trips:[], people:[], expenses:[],
    checklist:[], docs:[]
  };
  saveDB();
}
function saveDB(){ try{ localStorage.setItem('dmp_v2', JSON.stringify(DB)); }catch(e){} }
function uid(){ return Math.random().toString(36).slice(2,9)+Date.now().toString(36); }

/* ═══════════════════════════════════════════
   HELPERS
═══════════════════════════════════════════ */
var AVC=[['#E1F5EE','#085041'],['#E6F1FB','#0C447C'],['#FAEEDA','#633806'],['#FAECE7','#712B13'],['#EEEDFE','#3C3489']];
function avHtml(name,sz){
  sz=sz||36;
  var i=name.split('').reduce(function(a,c){return a+c.charCodeAt(0);},0)%AVC.length;
  var ini=name.split(' ').slice(0,2).map(function(w){return w[0]||'';}).join('').toUpperCase();
  return '<div class="av" style="width:'+sz+'px;height:'+sz+'px;background:'+AVC[i][0]+';color:'+AVC[i][1]+';font-size:'+Math.round(sz*.34)+'px">'+ini+'</div>';
}
function payStatus(p){
  if(p.paid>=p.due) return 'paid';
  if(p.paid>0) return 'partial';
  return 'pending';
}
function badgeHtml(status){
  var map={paid:'b-green',partial:'b-amber',pending:'b-red',active:'b-green',planning:'b-amber',completed:'b-blue'};
  var lbl={paid:T('paid'),partial:T('partial'),pending:T('pending'),active:T('active'),planning:T('planning'),completed:T('completed')};
  return '<span class="badge '+(map[status]||'b-gray')+'">'+(lbl[status]||status)+'</span>';
}
function fd(s){
  if(!s) return '';
  var d=new Date(s+'T00:00:00');
  return d.toLocaleDateString(LG==='zh'?'zh-TW':'en-US',{month:'short',day:'numeric'});
}
function fdFull(s){
  if(!s) return '';
  var d=new Date(s+'T00:00:00');
  return d.toLocaleDateString(LG==='zh'?'zh-TW':'en-US',{year:'numeric',month:'short',day:'numeric'});
}
function catLabel(c){ return TT('cats',c)||c; }
function tripTypeLabel(t){ return TT('tripTypes',t)||t; }

═══════════════════════════════════════════ */
function isPro(){ return PRO; }
function tryUnlock(code){
  if(code.trim().toUpperCase()===INVITE_CODE.toUpperCase()){
    PRO=true; localStorage.setItem('dmp_pro','1'); return true;
  }
  return false;
}
function lockPro(){ PRO=false; localStorage.removeItem('dmp_pro'); }
function changeCode(newCode){
  if(!newCode||newCode.trim().length<4) return false;
  INVITE_CODE=newCode.trim().toUpperCase();
  localStorage.setItem('dmp_code',INVITE_CODE);
  return true;
}

═══════════════════════════════════════════ */
function gotoTab(id){
  document.querySelectorAll('.screen').forEach(function(e){e.classList.remove('on');});
  document.querySelectorAll('.tab').forEach(function(e){e.classList.remove('on');});
  var sc=document.getElementById('sc-'+id);
  if(sc) sc.classList.add('on');
  var tb=document.getElementById('tab-'+id);
  if(tb) tb.classList.add('on');
  document.getElementById('scroll').scrollTop=0;
  var renders={overview:renderOverview,trips:renderTrips,people:renderPeople,finance:renderFinance,docs:renderDocs,settings:renderSettings,help:renderHelp};
  if(renders[id]) renders[id]();
}

function openModal(title,body,saveLabel,hideCancel){
  document.getElementById('m-title').textContent=title;
  document.getElementById('m-body').innerHTML=body;
  document.getElementById('m-save').textContent=saveLabel||T('saved')||'儲存';
  document.getElementById('m-save').style.display=saveLabel===false?'none':'';
  document.getElementById('m-save').onclick=modalSave;
  document.getElementById('m-cancel').textContent=T('cancel')||'取消';
  document.getElementById('m-cancel').style.display=hideCancel?'none':'';
  document.getElementById('modal-bg').classList.add('on');
}
function closeModal(){ document.getElementById('modal-bg').classList.remove('on'); }

   AI SCAN
═══════════════════════════════════════════ */
function startScan(){ document.getElementById('scan-file-input').click(); }
function handleScanFile(input){
  var file=input.files[0]; if(!file) return;
  var btn=document.getElementById('scan-main-btn');
  if(btn){btn.textContent=T('scanning');btn.classList.add('scanning');btn.disabled=true;}
  var reader=new FileReader();
  reader.onload=function(e){
    var base64=e.target.result.split(',')[1];
    var mtype=file.type||'image/jpeg';
    callClaudeOCR(base64,mtype,null,function(result,errType,errObj){
      if(btn){btn.textContent=T('scanBtn');btn.classList.remove('scanning');btn.disabled=false;}
      if(result) applyOCR(result);
      else if(errType==='nokey') noApiKeyAlert();
      else if(errType==='apierror') alert((LG==='zh'?'AI 錯誤：':'AI error: ')+(errObj&&errObj.message?errObj.message:JSON.stringify(errObj)));
      else alert(T('scanFail'));
    });
  };
  reader.readAsDataURL(file);
}

/* ── Expense receipt/invoice/chat-screenshot scan (multi-item) ── */
var scannedExpenseItems=[];
function startExpenseScan(){ document.getElementById('exp-scan-file-input').click(); }
function handleExpenseScanFile(input){
  var file=input.files[0]; if(!file) return;
  var btn=document.getElementById('exp-scan-btn');
  if(btn){btn.textContent=T('scanning');btn.classList.add('scanning');btn.disabled=true;}
  var reader=new FileReader();
  reader.onload=function(e){
    var base64=e.target.result.split(',')[1];
    var mtype=file.type||'image/jpeg';
    var targetLang=(LG==='zh'?'Traditional Chinese':'English');
    var prompt='This image is a receipt, invoice, price quote, or chat screenshot about dive trip costs (any language e.g. Thai/English/Chinese). It may show MULTIPLE cost items (different boat/package options, or several fee line items). Extract ALL distinct cost items you can find as a JSON array. Each element: {"desc":"short description, translated to '+targetLang+' if needed","amount":0,"costType":"A","category":"other"}. amount = plain number, no currency symbols/commas; if a range like 1500-2000 is given, use the average. costType: "A" = a lump-sum TOTAL for the whole group/charter (e.g. boat charter price). "B" = an amount that is ALREADY per-person (text shows "/\u4eba","/pax","each","per person"). category must be exactly one of: charter, accommodation, equipment, gas, flights, insurance, food, transport, permits, other. Return ONLY a JSON array (even if just one item), no markdown, no explanation.';
    callClaudeOCR(base64,mtype,prompt,function(result,errType,errObj){
      if(btn){btn.textContent=T('expScanBtn');btn.classList.remove('scanning');btn.disabled=false;}
      if(result) applyExpenseOCR(result);
      else if(errType==='nokey') noApiKeyAlert();
      else if(errType==='apierror') alert((LG==='zh'?'AI 錯誤：':'AI error: ')+(errObj&&errObj.message?errObj.message:JSON.stringify(errObj)));
      else alert(T('scanFail'));
    });
  };
  reader.readAsDataURL(file);
}
function applyExpenseOCR(r){
  var items=Array.isArray(r)?r:[r];
  items=items.filter(function(it){ return it&&it.amount&&Number(it.amount)>0; });
  if(!items.length){ alert(T('scanFail')); return; }
  scannedExpenseItems=items.map(function(it){
    var allCats=['charter','accommodation','equipment','gas','flights','insurance','food','transport','permits','other'];
    return {
      desc:String(it.desc||catLabel('other')).trim(),
      amount:Number(it.amount)||0,
      costType:(it.costType==='B')?'B':'A',
      category:(it.category&&allCats.indexOf(it.category)>=0)?it.category:'other',
      checked:true
    };
  });
  showScanReviewModal();
}
function showScanReviewModal(){
  var zh=LG==='zh';
  var b='<div class="t-small mb12">'+(zh?'偵測到 '+scannedExpenseItems.length+' 筆費用，請確認後新增（可取消勾選不需要的項目）：':'Detected '+scannedExpenseItems.length+' item(s). Review and uncheck any you don\'t want:')+'</div>';
  scannedExpenseItems.forEach(function(it,i){
    b+='<div class="card" style="margin-bottom:8px;padding:12px">';
    b+='<div class="row gap8" style="align-items:flex-start">';
    b+='<input type="checkbox" id="si-check-'+i+'" '+(it.checked?'checked':'')+' style="width:20px;height:20px;margin-top:10px;flex-shrink:0">';
    b+='<div style="flex:1">';
    b+='<input class="finput" id="si-desc-'+i+'" type="text" value="'+it.desc.replace(/"/g,'&quot;')+'" style="margin-bottom:8px">';
    b+='<div class="frow">';
    b+='<input class="finput" id="si-amt-'+i+'" type="number" min="0" value="'+it.amount+'">';
    b+='<select class="finput" id="si-type-'+i+'" style="padding:12px 8px">';
    b+='<option value="A"'+(it.costType==='A'?' selected':'')+'>'+(zh?'👥 總額':'👥 Total')+'</option>';
    b+='<option value="B"'+(it.costType==='B'?' selected':'')+'>'+(zh?'🧍 每人':'🧍 Per-Person')+'</option>';
    b+='</select>';
    b+='</div>';
    b+='<div class="t-xs" style="margin-top:4px">'+catLabel(it.category)+'</div>';
    b+='</div></div></div>';
  });
  openModal(zh?'確認掃描結果':'Confirm Scanned Items', b, zh?'新增選中項目':'Add Selected');
}
function hasApiKey(){ return !!(API_KEY&&API_KEY.trim()); }
function noApiKeyAlert(){
  var zh=LG==='zh';
  alert(zh?'尚未設定 AI 金鑰。請到 ⚙️ 設定 → AI 掃描設定 輸入你的 Anthropic API 金鑰才能使用掃描功能。':'No AI key set yet. Go to ⚙️ Settings → AI Scan Setup and enter your Anthropic API key to use scanning.');
}
function callClaudeOCR(base64,mtype,promptOverride,cb){
  if(typeof promptOverride==='function'){ cb=promptOverride; promptOverride=null; }
  if(!hasApiKey()){ cb(null,'nokey'); return; }
  var prompt=promptOverride||'Extract info from this document image. Return ONLY valid JSON with these keys (empty string if not found): {"name":"","passport":"","certLevel":"","certOrg":"","certNum":"","email":"","phone":""}. certLevel: ow/aow/rescue/dm/instructor/tech/other. certOrg: padi/ssi/cmas/naui/bsac/other. Return JSON only, no explanation.';
  fetch('https://api.anthropic.com/v1/messages',{
    method:'POST',
    headers:{
      'Content-Type':'application/json',
      'x-api-key':API_KEY.trim(),
      'anthropic-version':'2023-06-01',
      'anthropic-dangerous-direct-browser-access':'true'
    },
    body:JSON.stringify({model:'claude-sonnet-4-6',max_tokens:500,messages:[{role:'user',content:[{type:'image',source:{type:'base64',media_type:mtype,data:base64}},{type:'text',text:prompt}]}]})
  }).then(function(r){return r.json();}).then(function(data){

function calcPricing(tid){
  var trip=DB.trips.find(function(t){return t.id===tid;})||{};
  var ps=DB.people.filter(function(p){return p.tid===tid;});
  var actualPax=ps.length;
  savePricingInput(tid);
  var pi=trip.pricingInputs||{};
  var totalPax=pi.totalpax||actualPax||0;
  var focRule=pi.focrule||0;
  var coachCount=pi.coaches||0;
  var margin=pi.margin||20;
  var autoFoc=focRule>0?Math.floor(totalPax/focRule):0;
  var extraCoach=Math.max(coachCount-autoFoc,0);
  var paying=pi.paying>0?pi.paying:Math.max(totalPax-coachCount,1);
  var exps=DB.expenses.filter(function(e){return e.tid===tid;});
  /* A = Total amount, shared by group, divided by paying pax */
  var costA=exps.filter(function(e){return e.costType==='A'||!e.costType;}).reduce(function(a,e){return a+e.amt;},0);
  /* B = Per-person amount, already per-person, summed directly (not divided) */
  var costBPerPerson=exps.filter(function(e){return e.costType==='B';}).reduce(function(a,e){return a+e.amt;},0);
  var perPersonCost=(costA/paying)+costBPerPerson;
  var totalCost=costA+(costBPerPerson*paying);
  var suggested=margin<100?perPersonCost/(1-margin/100):perPersonCost*2;
  var revenue=suggested*paying;
  var profit=revenue-totalCost;
  var profitPct=revenue>0?(profit/revenue*100):0;
  var coachProfit=coachCount>0&&profit>0?profit/coachCount:profit;
  var breakEven=perPersonCost;
  var result={costA:costA,costBPerPerson:costBPerPerson,totalCost:totalCost,perPersonCost:perPersonCost,suggested:suggested,profit:profit,profitPct:profitPct,coachProfit:coachProfit,breakEven:breakEven,paying:paying,coachCount:coachCount,autoFoc:autoFoc,extraCoach:extraCoach,cur:CUR};
  trip.pricingResult=result; saveDB();
  renderPricingResult(result);
  /* clear stale TWD result since base numbers changed */
  var twdEl=document.getElementById('twd-result'); if(twdEl) twdEl.innerHTML='';
  trip.twdResult=null; saveDB();
}

  el.innerHTML=

function convertToTWD(tid){
  var trip=DB.trips.find(function(t){return t.id===tid;}); if(!trip) return;
  savePricingInput(tid);
  var r=trip.pricingResult;
  var el=document.getElementById('twd-result');
  if(!el) return;
  var zh=LG==='zh';
  if(!r){ el.innerHTML='<div class="t-small" style="color:#E24B4A">'+(zh?'請先按「立即計算」':'Please tap Calculate first')+'</div>'; return; }
  var rate=trip.fxRate||1;
  var target=trip.convTargetCur||'TWD';
  var tSym=(CURR[target]||CURR.TWD).sym;
  var extras=trip.twdExtras||[];
  var twdExtras=extras.reduce(function(a,ex){return a+(ex.amt||0);},0);
  var totalCostT=r.totalCost*rate+twdExtras;
  var suggestedT=r.suggested*rate + (r.paying>0?twdExtras/r.paying:0);
  var revenueT=suggestedT*r.paying;
  var profitT=revenueT-totalCostT;
  var profitPctT=revenueT>0?(profitT/revenueT*100):0;
  var coachProfitT=r.coachCount>0&&profitT>0?profitT/r.coachCount:profitT;
  var fmtT=function(n){ return tSym+Math.round(n).toLocaleString(); };
  el.innerHTML=
    '<div style="background:#fff8e6;border-radius:10px;padding:12px;margin-top:8px">'+
    '<div class="t-h3 mb8">💱 '+(zh?target+' 換算結果':target+' Conversion Result')+'</div>'+
    '<div style="font-size:13px;color:#633806;line-height:2">'+
    (zh?'原始總成本 × 匯率':'Original cost × rate')+' = '+fc(r.totalCost)+' × '+rate+' = <b>'+fmtT(r.totalCost*rate)+'</b><br>'+
    (twdExtras>0?
      (extras.map(function(ex){ return '• '+(ex.desc||'—')+': '+fmtT(ex.amt||0); }).join('<br>')+'<br>'+(zh?'小計':'Subtotal')+' = <b>'+fmtT(twdExtras)+'</b><br>'):'')+
    '<b>'+(zh?target+' 總成本':'Total Cost ('+target+')')+' = '+fmtT(totalCostT)+'</b></div>'+
    '<div class="pricing-result-grid" style="margin-top:10px">'+
    '<div class="pricing-box" style="background:#E1F5EE"><div class="pricing-box-val" style="color:#085041">'+fmtT(suggestedT)+'</div><div class="pricing-box-lbl" style="color:#085041">'+T('suggestedPrice')+' ('+target+')</div></div>'+
    '<div class="pricing-box" style="background:#f5f5f3"><div class="pricing-box-val">'+(r.coachCount>0?fmtT(coachProfitT):fmtT(profitT))+'</div><div class="pricing-box-lbl">'+(r.coachCount>0?T('coachProfit'):T('netProfit'))+' ('+target+')</div></div>'+
    '</div>'+
    '<div class="t-xs mt4">'+(zh?'利潤率約 '+Math.round(profitPctT)+'%':'~'+Math.round(profitPctT)+'% margin')+'</div>'+
    '</div>';
  trip.twdResult={rate:rate,twdExtras:twdExtras,target:target}; saveDB();
}

function handleFileUpload(input){
  var file=input.files[0]; if(!file) return;
  uploadedFileName=file.name; uploadedFileType=file.name.split('.').pop().toUpperCase();
  var reader=new FileReader();
  reader.onload=function(e){
    uploadedFile=e.target.result;
    var area=document.getElementById('upload-area');
    var lbl=document.getElementById('upload-lbl');
    var sub=document.getElementById('upload-sub');
    if(area) area.classList.add('has-file');
    if(lbl) lbl.textContent='✓ '+file.name;
    if(sub) sub.textContent=(Math.round(file.size/1024)||1)+' KB · '+uploadedFileType;
    var nameEl=document.getElementById('f-dname');
    if(nameEl&&!nameEl.value.trim()) nameEl.value=file.name.replace(/\.[^.]+$/,'');
  };
  reader.readAsDataURL(file);
}

  var ps=DB.people.filter(function(p){return p.tid===selTripId;});

  doc.setTextColor(0,0,0);

  doc.text(zh?'成員名單':'Member List',margin,y); y+=2;

    var orgLabels=S[LG]&&S[LG].orgs?S[LG].orgs:S.en.orgs;

      startY:y,
      margin:{left:margin,right:margin},
      styles:{fontSize:8,cellPadding:2},
      headStyles:{fillColor:[4,44,83],textColor:[255,255,255],fontStyle:'bold'},
      alternateRowStyles:{fillColor:[245,245,243]},
      head:[[zh?'姓名':'Name',zh?'證照':'Cert',zh?'機構':'Org',zh?'護照':'Passport',zh?'應付':'Due',zh?'已付':'Paid',zh?'狀態':'Status']],
      body:ps.map(function(p){
        var s=payStatus(p);
        var sLabel=zh?(s==='paid'?'✅已付':s==='partial'?'⚠️部份':'❌未付'):(s==='paid'?'✅Paid':s==='partial'?'⚠️Partial':'❌Pending');
        return [p.name,(certLabels[p.cert]||p.cert),(orgLabels[p.org]||p.org),p.passport||'—',sym+(p.due||0).toLocaleString(),sym+(p.paid||0).toLocaleString(),sLabel];
      })
    });
    y=doc.lastAutoTable.finalY+8;
  } else { y+=6; }

  /* ── Expenses table ── */
  if(y>240){ doc.addPage(); y=14; }
  doc.setFontSize(11); doc.setFont('helvetica','bold');
  doc.setTextColor(0,0,0);
  doc.text(zh?'費用記錄':'Expense Records',margin,y); y+=2;
  if(exps.length>0){
    var catLabels=S[LG]&&S[LG].cats?S[LG].cats:S.en.cats;
    var totalAmt=exps.reduce(function(a,e){return a+e.amt;},0);
    doc.autoTable({
      startY:y,
      margin:{left:margin,right:margin},
      styles:{fontSize:8,cellPadding:2},
      headStyles:{fillColor:[4,44,83],textColor:[255,255,255],fontStyle:'bold'},
      alternateRowStyles:{fillColor:[245,245,243]},
      head:[[zh?'項目':'Item',zh?'類別':'Category',zh?'類型':'Type',zh?'日期':'Date',zh?'金額':'Amount']],
      body:exps.map(function(e){

        return [e.desc,(catLabels[e.cat]||e.cat),typeLabel,e.date,sym+(e.amt||0).toLocaleString()];
      }),
      foot:[[{content:(zh?'費用合計':'Total'),colSpan:4,styles:{fontStyle:'bold',halign:'right'}},{content:sym+totalAmt.toLocaleString(),styles:{fontStyle:'bold'}}]]
    });
    y=doc.lastAutoTable.finalY+8;
  }

  /* ── Pricing result ── */
  var pr=trip.pricingResult;
  if(pr){
    if(y>240){ doc.addPage(); y=14; }
    doc.setFontSize(11); doc.setFont('helvetica','bold');
    doc.setTextColor(0,0,0);
    doc.text(zh?'收費計算結果':'Pricing Summary',margin,y); y+=6;
    doc.setFontSize(9); doc.setFont('helvetica','normal');
    var lines=[
      [(zh?'建議每人收費':'Suggested Price/pax'), sym+Math.round(pr.suggested).toLocaleString()],
      [(zh?'每人成本':'Cost/pax'), sym+Math.round(pr.perPersonCost).toLocaleString()],
      [(zh?'損益平衡點':'Break-even'), sym+Math.round(pr.breakEven).toLocaleString()],

    ];

      doc.text(l[0]+':',margin,y);
      doc.text(l[1],90,y);

    });
  }

  /* ── Footer ── */
  doc.setFontSize(7); doc.setTextColor(160,160,160);
  doc.text('Generated by DiveMaster Pro · '+new Date().toLocaleString(),pageW/2,doc.internal.pageSize.getHeight()-6,{align:'center'});

  var dateStr=new Date().toISOString().slice(0,10);
  doc.save(trip.name+'_'+dateStr+'.pdf');
}
function exportBackup(){

    app:'DiveMasterPro',
    version:2,
    exportedAt:new Date().toISOString(),
    DB:DB,
    PROFILE:PROFILE,
    prefs:JSON.parse(localStorage.getItem('dmp_prefs')||'{}'),
    CUR:CUR,
    LG:LG
  };
  var json=JSON.stringify(data,null,2);
  var blob=new Blob([json],{type:'application/json'});
  var url=URL.createObjectURL(blob);
  var a=document.createElement('a');
  var dateStr=new Date().toISOString().slice(0,10);
  a.href=url;

function handleRestoreFile(input){
  var file=input.files[0]; if(!file) return;
  if(!confirm(T('restoreConfirm'))){ input.value=''; return; }
  var reader=new FileReader();
  reader.onload=function(e){
    try{
      var data=JSON.parse(e.target.result);
      if(!data||data.app!=='DiveMasterPro'||!data.DB||!Array.isArray(data.DB.trips)) throw new Error('invalid');
      localStorage.setItem('dmp_v2',JSON.stringify(data.DB));
      if(data.PROFILE) localStorage.setItem('dmp_profile',JSON.stringify(data.PROFILE));
      if(data.prefs) localStorage.setItem('dmp_prefs',JSON.stringify(data.prefs));
      if(data.CUR) localStorage.setItem('dmp_cur',data.CUR);
      if(data.LG) localStorage.setItem('dmp_lg',data.LG);
      alert(T('restoreSuccess'));
      location.reload();
    }catch(err){
      alert(T('restoreFail'));
      input.value='';
    }
  };
  reader.readAsText(file);
}

function handleImportPeopleFile(input){
  var file=input.files[0]; if(!file) return;
  var reader=new FileReader();
  reader.onload=function(e){
    try{
      var data=new Uint8Array(e.target.result);
      var wb=XLSX.read(data,{type:'array'});
      var ws=wb.Sheets[wb.SheetNames[0]];
      var rows=XLSX.utils.sheet_to_json(ws,{header:1,defval:''});
      if(!rows||rows.length<2){ alert(T('importNoRows')); return; }
      /* Column mapping - support Chinese and English headers */
      var headerRow=rows[0].map(function(h){ return String(h).trim(); });
      var colMap={};
      var aliases={
        name:['姓名','name','全名','full name'],
        passport:['護照號碼','passport','護照','passport no'],
        email:['email','電子郵件','電郵','e-mail'],
        phone:['電話','phone','手機','mobile','tel'],
        cert:['證照等級','cert level','cert','certlevel','certification'],
        org:['發證機構','cert org','org','organization','certorg'],
        certNum:['證照號碼','cert number','certnum','cert no','certno'],
        due:['應付金額','amount due','due','amount','金額']
      };
      Object.keys(aliases).forEach(function(field){
        aliases[field].forEach(function(alias){
          headerRow.forEach(function(h,i){
            if(h.toLowerCase()===alias.toLowerCase()&&colMap[field]===undefined) colMap[field]=i;
          });
        });
      });
      if(colMap.name===undefined){ alert(LG==='zh'?'找不到「姓名」欄位，請確認標題列':'Could not find "Name" column — check the header row'); return; }
      var parsed=[];
      for(var i=1;i<rows.length;i++){
        var row=rows[i];
        var nm=String(row[colMap.name]||'').trim();
        if(!nm) continue;
        var certRaw=String(row[colMap.cert]||'').trim().toLowerCase();
        var certMap={'開放水域':'ow','ow':'ow','open water':'ow','進階':'aow','aow':'aow','advanced':'aow','救援':'rescue','rescue':'rescue','潛水長':'dm','dm':'dm','divemaster':'dm','教練':'instructor','instructor':'instructor','技術':'tech','tech':'tech'};
        var cert=certMap[certRaw]||'ow';
        var orgRaw=String(row[colMap.org]||'').trim().toLowerCase().replace(/[^a-z0-9]/g,'');
        var orgMap={'sditdi':'sditdi','sdi':'sditdi','tdi':'sditdi','padi':'padi','ssi':'ssi','cmas':'cmas','naui':'naui','bsac':'bsac','raid':'raid','aida':'aida','molchanovs':'molchanovs','pfi':'pfi'};
        var org=orgMap[orgRaw]||'padi';
        parsed.push({
          name:nm,
          passport:String(row[colMap.passport]||'').trim(),
          email:String(row[colMap.email]||'').trim(),
          phone:String(row[colMap.phone]||'').trim(),
          cert:cert, org:org,
          certNum:String(row[colMap.certNum]||'').trim(),
          due:parseFloat(row[colMap.due])||0,
          checked:true
        });
      }
      if(!parsed.length){ alert(T('importNoRows')); return; }
      showImportReviewModal(parsed);
    }catch(err){ alert(T('importParseFail')); }
  };
  reader.readAsArrayBuffer(file);
}

    '[DiveMaster Pro Bug Report]\nDate: '+new Date().toLocaleDateString('en-US')+'\nScreen: \nAction: \nProblem: \nScreenshot: (please attach)';
  if(navigator.clipboard){ navigator.clipboard.writeText(tmpl).then(function(){ alert(T('copied')); }); }
  else { var ta=document.createElement('textarea'); ta.value=tmpl; document.body.appendChild(ta); ta.select(); document.execCommand('copy'); document.body.removeChild(ta); alert(T('copied')); }
}

function modalSave(){
  if(modalMode==='editTrip'){
    var eid=document.getElementById('f-editid').value;
    var t=DB.trips.find(function(x){return x.id===eid;}); if(!t) return;
    var n=document.getElementById('f-tname').value.trim(); if(!n) return;
    t.name=n;
    t.dest=document.getElementById('f-tdest').value||'';
    t.charter=document.getElementById('f-tcharter').value||'';
    t.dep=document.getElementById('f-tdep').value||'';
    t.ret=document.getElementById('f-tret').value||'';
    t.tripType=selTripType;
    t.focRule=parseInt(document.getElementById('f-tfoc').value)||0;
    t.margin=parseFloat(document.getElementById('f-tmargin').value)||20;
    saveDB(); closeModal(); renderTrips();
  }
  else if(modalMode==='addTrip'){
    var n=document.getElementById('f-tname').value.trim();
    if(!n) return;
    var id=uid();
    DB.trips.push({
      id:id, name:n,
      dest:document.getElementById('f-tdest').value||'',
      charter:document.getElementById('f-tcharter').value||'',
      dep:document.getElementById('f-tdep').value||'',
      ret:document.getElementById('f-tret').value||'',
      tripType:selTripType,
      status:'planning',
      focRule:parseInt(document.getElementById('f-tfoc').value)||0,
      margin:parseFloat(document.getElementById('f-tmargin').value)||20,
      coachCount:0, notes:''
    });
    saveDB(); closeModal(); renderTrips();
  }
  else if(modalMode==='addPerson'){
    var nm=document.getElementById('f-pname').value.trim();
    if(!nm){ var e=document.getElementById('fe-pname'); if(e) e.style.display='block'; return; }
    if(!selTripId && DB.trips.length) selTripId=DB.trips[0].id;
    DB.people.push({
      id:uid(), tid:selTripId, name:nm,
      email:document.getElementById('f-pemail').value||'',
      phone:document.getElementById('f-pphone').value||'',
      passport:document.getElementById('f-ppassport').value||'',
      cert:selCert, org:selOrg,
      certNum:document.getElementById('f-pcertnum').value||'',
      due:parseFloat(document.getElementById('f-pdue').value)||0,
      paid:0
    });
    saveDB(); closeModal(); renderPeople();
  }
  else if(modalMode==='importReview'){
    var parsed=window._importParsed||[];
    var added=0;
    parsed.forEach(function(p,i){
      var chk=document.getElementById('ip-check-'+i);
      if(!chk||!chk.checked) return;
      if(!selTripId && DB.trips.length) selTripId=DB.trips[0].id;
      DB.people.push({
        id:uid(), tid:selTripId, name:p.name,
        email:p.email||'', phone:p.phone||'',
        passport:p.passport||'',
        cert:p.cert, org:p.org, certNum:p.certNum||'',
        due:p.due||0, paid:0
      });
      added++;
    });
    saveDB(); closeModal();
    if(added>0){
      window._importParsed=[];
      renderPeople();
      alert(T('importDone').replace('{n}',added));
    }
  }
  else if(modalMode==='scanReview'){
    var added=0;
    scannedExpenseItems.forEach(function(it,i){
      var chk=document.getElementById('si-check-'+i);
      if(!chk||!chk.checked) return;
      var descEl=document.getElementById('si-desc-'+i);
      var amtEl=document.getElementById('si-amt-'+i);
      var typeEl=document.getElementById('si-type-'+i);
      var desc=descEl?descEl.value.trim():it.desc;
      var amt=amtEl?(parseFloat(amtEl.value)||0):it.amount;
      var ctype=typeEl?typeEl.value:it.costType;
      if(!desc||amt<=0) return;
      if(!selTripId && DB.trips.length) selTripId=DB.trips[0].id;
      var trip=DB.trips.find(function(t){return t.id===selTripId;})||{};
      DB.expenses.push({
        id:uid(), tid:selTripId, cat:it.category||'other',
        costType:ctype, desc:desc, amt:amt, curr:CUR,
        date:trip.dep||new Date().toISOString().slice(0,10)
      });
      added++;
    });
    saveDB(); closeModal();
    if(added>0){ scannedExpenseItems=[]; renderFinance(); }
    else { alert(LG==='zh'?'未選擇任何項目':'No items selected'); showScanReviewModal(); }
  }
  else if(modalMode==='addExpense'){
    var desc=document.getElementById('f-edesc').value.trim();
    var amt=parseFloat(document.getElementById('f-eamt').value)||0;
    if(!desc||isNaN(amt)||amt<=0) return;
    if(!selTripId && DB.trips.length) selTripId=DB.trips[0].id;
    var ct=document.getElementById('f-costtype');
    DB.expenses.push({
      id:uid(), tid:selTripId, cat:selExpCat,
      costType:ct?ct.value:'A',
      desc:desc, amt:amt, curr:CUR,
      date:document.getElementById('f-edate').value||new Date().toISOString().slice(0,10)
    });
    saveDB(); closeModal(); renderFinance();
  }
  else if(modalMode==='addDoc'){
    var dn=document.getElementById('f-dname').value.trim();
    if(!dn&&uploadedFileName) dn=uploadedFileName.replace(/\.[^.]+$/,'');
    if(!dn) return;
    if(!selTripId && DB.trips.length) selTripId=DB.trips[0].id;
    DB.docs.push({
      id:uid(), tid:selTripId,
      pid:document.getElementById('f-dpid').value||'',
      cat:selDocCat, name:dn,
      exp:document.getElementById('f-dexp').value||'',
      fileData:uploadedFile||null, fileType:uploadedFileType||''
    });
    uploadedFile=null; uploadedFileName=''; uploadedFileType='';
    saveDB(); closeModal(); renderDocs();
  }
  else if(modalMode==='editProfile'){
    var v=document.getElementById('f-prof').value.trim();
    if(v){ PROFILE[editProfileField]=v; localStorage.setItem('dmp_profile',JSON.stringify(PROFILE)); }
    closeModal(); renderSettings();
  }
  else if(modalMode==='unlock'){
    var code=document.getElementById('f-code').value.trim();
    if(tryUnlock(code)){
      closeModal();
      var zh2=LG==='zh';
      showWelcomeModal();
    } else {
      var err=document.getElementById('code-error'); if(err) err.style.display='block';
    }
  }
  else if(modalMode==='changeCode'){
    var nc=document.getElementById('f-newcode').value.trim();
    if(changeCode(nc)){
      closeModal();
      alert((LG==='zh'?T('codeUpdated'):T('codeUpdated'))+INVITE_CODE);
      renderSettings();
    } else {
      alert(LG==='zh'?'邀請碼至少需要4個字元':'Code must be at least 4 characters');
    }
  }
}

document.addEventListener('focusin',function(e){
  if(!e.target) return;
  var tag=e.target.tagName;
  if(tag==='INPUT'||tag==='TEXTAREA'||tag==='SELECT'){
    var modal=document.getElementById('modal-bg');
    if(modal&&modal.classList.contains('on')){
      setTimeout(function(){ try{ e.target.scrollIntoView({behavior:'smooth',block:'center'}); }catch(err){} },350);
    }
  }
});
